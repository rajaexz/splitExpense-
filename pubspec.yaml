name: jobcrak
description: A professional job search and application mobile app built with Flutter MVVM architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Navigation
  go_router: ^12.1.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Network
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.18.1
  qr_flutter: ^4.1.0
  rxdart: ^0.27.7
  uuid: ^4.2.1
  permission_handler: ^11.3.0
  contacts_service_plus: ^0.0.2
  url_launcher: ^6.2.5
  share_plus: ^10.0.2
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.1
  audioplayers: ^6.0.0
  firebase_analytics: ^11.3.3
  cloud_functions: ^5.1.3
  
  # Location & Maps
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  
  # Real-time & Communication
  agora_rtc_engine: ^6.3.2
  
  # Image & Media
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  file_picker: ^8.1.2
  camera: ^0.11.0+2
  video_player: ^2.9.1

flutter_launcher_icons:
  image_path: "assets/icon/logo.png"
  android: true
  ios: true
  
dependency_overrides:
  collection: 1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/onbording/
    - assets/icons/
    - assets/sound/
  
  # Fonts - Uncomment when you add Poppins font files
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

